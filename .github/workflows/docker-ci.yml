#只要把代碼推送到 GitHub，這個腳本就會自動啟動一台虛擬主機，把 Java 代碼 compile 好並打包為 Image，最後存放到雲端倉庫
name: Java Spring Jib CI

# 觸發條件，對 main branch 進行 git push 時這個腳本才會啟動
on:
  push:
    branches: [ "main" ]

# 環境變數
env:
  REGISTRY: ghcr.io # 指定要把成品放在 GitHub Container Repository
  IMAGE_NAME: cicd-practice # 這是 github 的內建變數，會自動抓取專案路徑

# 工作設定
jobs:
  # 任務名稱
  build-and-push:
    # 在哪裡執行，ubuntu 是github 提供的虛擬機
    runs-on: ubuntu-latest
    # 權限設定，因為要把成品寫入到 Github Container Repository，所以設為 write
    permissions:
      contents: read
      packages: write

    # 執行步驟
    steps:
      # 取得專案程式碼
      - name: Checkout repository
        # 引用別人寫好的工具
        uses: actions/checkout@v4

      # 安裝 Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # 要用哪家公司的 JDK
          cache: maven # 會記住你下載過的 Java Dependencies，下次執行時就不必重新下載，速度會快很多

      # 用 jib 進行打包
      - name: Build and Push Image with Jib
        # 執行自訂義的 shell script
        # |:Pipe symbol
        # \:代表「換行接續執行」
        # -D:在 Maven 中用來傳遞系統屬性
        # -Dimage:成品名字
        # -Djib.to.auth.username:發起 action 的 Github 帳號
        # -Djib.to.auth.password:GitHub 會在任務啟動時，自動生成一個臨時的、僅限本次使用的 Token
        run: |
          LOWER_USER=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          mvn compile jib:build \
            -Dimage=${{ env.REGISTRY }}/${LOWER_USER}/${{ env.IMAGE_NAME }}:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}